<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NTE Guide Hub | Hesperia Database</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Dark Theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    :root {
      --theme-color: #ff3e3e;
      --sidebar-background: #121212;
      --content-background: #1a1a1a;
    }

    body { background-color: var(--content-background); }
    .sidebar { background-color: var(--sidebar-background); border-right: 1px solid #333; }

    /* Styling Sidebar Links as Buttons */
    .sidebar-nav li > a {
      margin: 8px 15px;
      padding: 10px;
      border-radius: 4px;
      text-align: center;
      font-weight: bold;
      text-transform: uppercase;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    /* Red Button for Characters */
    .sidebar-nav a[href="#/characters"] {
      background: #ff3e3e !important;
      color: white !important;
    }

    /* Gold Button for Tier List */
    .sidebar-nav a[href="#/tier-list"] {
      background: #d4af37 !important;
      color: black !important;
    }

    /* Outline Button for Arcs */
    .sidebar-nav a[href="#/arcs"] {
      border-color: #ff3e3e !important;
      color: #ff3e3e !important;
    }

    .sidebar-nav a:hover {
      transform: scale(1.05);
      filter: brightness(1.1);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="app">Accessing Hesperia Archives...</div>
  <script>
    window.$docsify = {
      name: 'NTE Guide',
      loadSidebar: true,
      auto2top: true,
      homepage: 'README.md',
      search: 'auto'
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
