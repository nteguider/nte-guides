<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NTE Guide Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Библиотеки: Тема + Иконки -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    :root {
      --theme-color: #ff3e3e;
      --sidebar-background: #18191c; /* Более глубокий цвет как на примере */
      --content-background: #1a1a1a;
    }

    body { background-color: var(--content-background); }
    .sidebar { background-color: var(--sidebar-background); border-right: 1px solid #2d2f34; }

    /* Стилизация ссылок в боковом меню */
    .sidebar-nav li a {
      display: flex !important;
      align-items: center;
      padding: 12px 20px !important;
      font-size: 15px !important;
      font-weight: 500;
      color: #b9bbbe !important;
      text-decoration: none !important;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
    }

    /* Иконки перед текстом */
    .sidebar-nav li a i {
      margin-right: 15px;
      width: 20px;
      text-align: center;
      font-size: 18px;
    }

    /* Эффект при наведении */
    .sidebar-nav li a:hover {
      background: #2e3035;
      color: #ffffff !important;
      border-left-color: var(--theme-color);
    }

    /* Активный пункт меню */
    .sidebar-nav li.active > a {
      color: #ffffff !important;
      background: #2e3035;
      border-left-color: var(--theme-color);
    }

    /* Разделители между группами */
    .sidebar-nav strong {
      display: block;
      padding: 20px 20px 10px;
      font-size: 12px;
      text-transform: uppercase;
      color: #72767d;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="app">Accessing Hesperia Archives...</div>
  <script>
    window.$docsify = {
      name: 'NTE Guide',
      loadSidebar: true,
      auto2top: true,
      homepage: 'README.md'
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
