<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>NTE Guide Hub | База данных Хесперии</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Основная темная тема -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    /* Кастомные переменные в стиле NTE */
    :root {
      --theme-color: #ff3e3e; /* Ярко-красный акцент */
      --sidebar-background: #121212;
      --content-background: #1a1a1a;
    }

    /* Общие стили страницы */
    body {
      background-color: var(--content-background);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .sidebar {
      background-color: var(--sidebar-background);
      border-right: 1px solid #333;
    }

    /* Контейнер для кнопок на главной */
    .btn-container {
      display: flex;
      gap: 15px;
      margin: 25px 0;
      flex-wrap: wrap;
    }

    /* Стили кнопок-плашек */
    .nav-btn {
      padding: 14px 28px;
      border-radius: 4px;
      font-weight: 800;
      text-transform: uppercase;
      text-decoration: none !important;
      letter-spacing: 1px;
      transition: all 0.2s ease-in-out;
      display: inline-block;
      min-width: 150px;
      text-align: center;
      border: none;
      cursor: pointer;
    }

    /* Красная кнопка (Characters) */
    .btn-red {
      background: #ff3e3e;
      color: #fff !important;
    }

    /* Золотая кнопка (Tier List) */
    .btn-gold {
      background: #d4af37;
      color: #000 !important;
    }

    /* Контурная кнопка (Arcs) */
    .btn-outline {
      border: 2px solid #ff3e3e;
      color: #ff3e3e !important;
      padding: 12px 26px; /* Компенсация границы */
    }

    .nav-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
      filter: brightness(1.1);
    }

    /* Поиск */
    .search input {
      background: #252525 !important;
      border-radius: 20px !important;
    }
  </style>
</head>
<body>
  <div id="app">Загрузка архивов NTE...</div>
  
  <script>
    window.$docsify = {
      name: 'NTE Guide',
      repo: '', // Вставьте ссылку на GitHub, если хотите иконку в углу
      loadSidebar: true, // Загружать меню из _sidebar.md
      subMaxLevel: 3,
      auto2top: true,
      
      // Настройки поиска
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Поиск по базе...',
        noData: 'Ничего не найдено',
        depth: 6
      }
    }
  </script>

  <!-- Скрипты движка Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Плагин поиска -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <!-- Плагин зума картинок -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  
  <!-- Плагин копирования кода -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
</body>
</html>
