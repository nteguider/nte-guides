<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTE Admin Panel & DB</title>
    <style>
        :root {
            --bg-body: #212126;
            --bg-sidebar: #1b1b1e;
            --bg-panel: #2a2a32;
            --text-main: #e0e0e0;
            --accent-blue: #00a8ff;
            --accent-red: #ff4d4d;
            --border-color: #383842;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            position: fixed;
            height: 100%;
        }

        .nav-item {
            padding: 15px 20px;
            display: block;
            cursor: pointer;
            color: var(--text-main);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.05);
            color: var(--accent-blue);
            border-left-color: var(--accent-blue);
        }

        .admin-btn { color: var(--accent-red); margin-top: 20px; border-top: 1px solid var(--border-color); }

        /* MAIN CONTENT */
        .main-content { margin-left: 220px; flex-grow: 1; padding: 30px; }
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section-header {
            background-color: var(--bg-panel);
            padding: 12px;
            border-top: 2px solid var(--accent-blue);
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* ADMIN FORM */
        .admin-form {
            background: var(--bg-panel);
            padding: 20px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 500px;
        }

        input, select, textarea {
            background: #1b1b1e;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            border-radius: 4px;
        }

        button {
            background: var(--accent-blue);
            border: none;
            color: white;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { opacity: 0.8; }

        /* LISTS */
        .grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .item-card {
            width: 120px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            text-align: center;
            padding-bottom: 10px;
            position: relative;
        }
        .item-card img { width: 100%; height: 120px; object-fit: cover; background: #444; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: red; font-size: 10px; padding: 2px 5px; }

        /* TIER LIST */
        .tier-row { display: flex; background: var(--bg-panel); margin-bottom: 5px; min-height: 100px; border: 1px solid var(--border-color); }
        .tier-label { width: 80px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        .t0 { background: #ff4d4d; } .t1 { background: #ff7f50; } .t2 { background: #ffb347; }
        .tier-items { display: flex; padding: 10px; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="padding: 20px; font-weight: bold; color: var(--accent-blue);">NTE DATABASE</div>
        <a onclick="showPage('home')" class="nav-item active" id="btn-home">🏠 Home</a>
        <a onclick="showPage('chars')" class="nav-item" id="btn-chars">👥 Characters</a>
        <a onclick="showPage('weapons')" class="nav-item" id="btn-weapons">🔫 Weapons</a>
        <a onclick="showPage('tierlist')" class="nav-item" id="btn-tierlist">📊 Tier List</a>
        <a onclick="loginAdmin()" class="nav-item admin-btn">🔐 Admin Panel</a>
    </aside>

    <main class="main-content">
        <!-- HOME -->
        <div id="home" class="page active">
            <h1>Welcome</h1>
            <p>Используйте панель администратора (пароль 1234), чтобы наполнить базу данными.</p>
        </div>

        <!-- CHARACTERS PAGE -->
        <div id="chars" class="page">
            <div class="section-header">Characters List</div>
            <div id="chars-grid" class="grid"></div>
        </div>

        <!-- WEAPONS PAGE -->
        <div id="weapons" class="page">
            <div class="section-header">Weapons Database</div>
            <div id="weapons-grid" class="grid"></div>
        </div>

        <!-- TIER LIST -->
        <div id="tierlist" class="page">
            <div class="section-header">Character Tier List</div>
            <div class="tier-row"><div class="tier-label t0">T0</div><div id="tier-T0" class="tier-items"></div></div>
            <div class="tier-row"><div class="tier-label t1">T1</div><div id="tier-T1" class="tier-items"></div></div>
            <div class="tier-row"><div class="tier-label t2">T2</div><div id="tier-T2" class="tier-items"></div></div>
        </div>

        <!-- ADMIN PANEL -->
        <div id="admin" class="page">
            <div class="section-header">Admin Control Panel</div>
            <div class="admin-form">
                <h3>Add New Entry</h3>
                <select id="entry-type">
                    <option value="char">Character</option>
                    <option value="weapon">Weapon</option>
                </select>
                <input type="text" id="entry-name" placeholder="Name">
                <input type="text" id="entry-img" placeholder="Image URL (link)">
                <textarea id="entry-desc" placeholder="Description / Stats"></textarea>
                <select id="entry-tier">
                    <option value="none">No Tier (for weapons)</option>
                    <option value="T0">Tier 0</option>
                    <option value="T1">Tier 1</option>
                    <option value="T2">Tier 2</option>
                </select>
                <button onclick="saveEntry()">Save Entry</button>
            </div>
        </div>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('nte_db')) || { chars: [], weapons: [] };

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(document.getElementById('btn-'+pageId)) document.getElementById('btn-'+pageId).classList.add('active');
            renderData();
        }

        function loginAdmin() {
            const pass = prompt("Enter Admin Password:");
            if(pass === "1234") {
                showPage('admin');
            } else {
                alert("Wrong password!");
            }
        }

        function saveEntry() {
            const type = document.getElementById('entry-type').value;
            const entry = {
                id: Date.now(),
                name: document.getElementById('entry-name').value,
                img: document.getElementById('entry-img').value || 'https://via.placeholder.com/120',
                desc: document.getElementById('entry-desc').value,
                tier: document.getElementById('entry-tier').value
            };

            if(type === 'char') db.chars.push(entry);
            else db.weapons.push(entry);

            localStorage.setItem('nte_db', JSON.stringify(db));
            alert("Saved!");
            renderData();
        }

        function deleteItem(type, id) {
            if(type === 'char') db.chars = db.chars.filter(i => i.id !== id);
            else db.weapons = db.weapons.filter(i => i.id !== id);
            localStorage.setItem('nte_db', JSON.stringify(db));
            renderData();
        }

        function renderData() {
            // Render Chars
            const charGrid = document.getElementById('chars-grid');
            charGrid.innerHTML = db.chars.map(i => `
                <div class="item-card">
                    <button class="delete-btn" onclick="deleteItem('char', ${i.id})">X</button>
                    <img src="${i.img}">
                    <div><b>${i.name}</b></div>
                    <div style="font-size:10px">${i.desc}</div>
                </div>
            `).join('');

            // Render Weapons
            const weapGrid = document.getElementById('weapons-grid');
            weapGrid.innerHTML = db.weapons.map(i => `
                <div class="item-card">
                    <button class="delete-btn" onclick="deleteItem('weapon', ${i.id})">X</button>
                    <img src="${i.img}">
                    <div><b>${i.name}</b></div>
                    <div style="font-size:10px">${i.desc}</div>
                </div>
            `).join('');

            // Render Tier List
            ['T0', 'T1', 'T2'].forEach(t => {
                const container = document.getElementById('tier-'+t);
                container.innerHTML = db.chars.filter(c => c.tier === t).map(i => `
                    <div class="item-card" style="width:70px; height:auto;">
                        <img src="${i.img}" style="height:70px">
                        <div style="font-size:10px">${i.name}</div>
                    </div>
                `).join('');
            });
        }

        // Initial Load
        renderData();
    </script>
</body>
</html>
