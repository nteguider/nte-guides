<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NTE Guide Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    :root {
      --theme-color: #ff3e3e;
      --sidebar-background: #18191c;
      --content-background: #1a1a1a;
    }

    body { background-color: var(--content-background); }
    .sidebar { background-color: var(--sidebar-background); border-right: 1px solid #2d2f34; }

    .sidebar-nav li a {
      display: flex !important;
      align-items: center;
      padding: 12px 20px !important;
      color: #b9bbbe !important;
      text-decoration: none !important;
    }

    .sidebar-nav li a i { margin-right: 15px; width: 20px; text-align: center; }

    .sidebar-nav li.active > a {
      color: #ffffff !important;
      background: #2e3035;
      border-left: 3px solid var(--theme-color);
    }
  </style>
</head>
<body>
  <div id="app">Loading Hesperia Archives...</div>
  <script>
  window.$docsify = {
    name: 'NTE Guide',
    loadSidebar: true,
    subMaxLevel: 2,
    alias: {
      '/.*/_sidebar.md': '/_sidebar.md'
    }
  }
