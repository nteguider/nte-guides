<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTE | Hesperia Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f1113; color: #d1d5db; font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; margin: 0; }
        .nte-title { font-family: 'Orbitron', sans-serif; }
        .sidebar { width: 260px; background-color: #090a0c; border-right: 1px solid #1e2124; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
        .nav-link { padding: 0.8rem 1.5rem; display: block; transition: 0.2s; cursor: pointer; color: #9ca3af; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .nav-link:hover { color: #ffffff; background: #16181b; }
        .nav-link.active { color: #ffffff; background: #16181b; border-right: 3px solid #ef4444; }
        .nav-label { font-size: 0.65rem; color: #4b5563; padding: 1.5rem 1.5rem 0.5rem; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 800; }
        .main-content { flex-grow: 1; padding: 2.5rem; overflow-y: auto; background-color: #111315; width: 100%; }
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        
        .collapsible-trigger { cursor: pointer; display: flex; justify-content: space-between; align-items: center; width: 100%; transition: 0.3s; }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, opacity 0.2s; opacity: 0; }
        .collapsible-content.open { max-height: 2000px; opacity: 1; margin-top: 1.5rem; }
        .chevron { transition: transform 0.3s; }
        .rotate-180 { transform: rotate(180deg); }

        .admin-input { background: #0f1113; border: 1px solid #1e2124; color: white; padding: 8px; font-size: 11px; border-radius: 4px; width: 100%; outline: none; }
        .admin-label { font-size: 9px; font-weight: 800; color: #ef4444; uppercase; margin-bottom: 4px; display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside class="sidebar flex flex-col">
        <div class="p-6 mb-2">
            <h1 class="nte-title text-2xl text-white tracking-widest border-b-2 border-red-600 pb-1 inline-block">NTE</h1>
        </div>
        <nav class="flex-grow">
            <div class="nav-label">Main Console</div>
            <div onclick="showSection('home')" id="nav-home" class="nav-link active">Home</div>
            <div class="nav-label">Archives</div>
            <div onclick="showSection('characters')" id="nav-characters" class="nav-link">Characters</div>
            <div onclick="showSection('weapons')" id="nav-weapons" class="nav-link">Arcs</div>
            <div onclick="showSection('tierlist')" id="nav-tierlist" class="nav-link">Tier List</div>
        </nav>
        <div class="p-6 border-t border-white/5 text-center">
            <button onclick="adminLogin()" class="text-[10px] text-gray-800 hover:text-red-500 font-bold uppercase tracking-widest transition">System Admin</button>
        </div>
    </aside>

    <main class="main-content">
        <!-- Sections -->
        <section id="sect-home" class="content-section active py-20 text-center">
            <h2 class="nte-title text-5xl text-white mb-6 uppercase tracking-tighter">HESPERIA ARCHIVES</h2>
            <div class="w-24 h-1 bg-red-600 mx-auto mb-6"></div>
        </section>

        <section id="sect-characters" class="content-section">
            <h2 class="nte-title text-2xl text-white mb-8 uppercase tracking-widest">Personnel Database</h2>
            <div id="char-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </section>

        <section id="sect-weapons" class="content-section">
            <h2 class="nte-title text-2xl text-white mb-8 uppercase tracking-widest">Arc Inventory</h2>
            <div id="weapon-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="sect-char-detail" class="content-section">
            <button onclick="showSection('characters')" class="mb-6 text-red-500 text-[10px] font-bold uppercase tracking-widest hover:text-white transition flex items-center gap-2"><span>&larr;</span> Back</button>
            <div id="detail-view"></div>
        </section>

        <!-- Admin -->
        <section id="sect-admin" class="content-section">
            <div class="max-w-6xl bg-[#1a1c1e] p-10 rounded-2xl border border-red-600/20 shadow-2xl">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="nte-title text-xl text-white uppercase tracking-widest">System Overload</h2>
                    <button onclick="commitAllChanges()" class="bg-red-600 text-white px-8 py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest hover:bg-red-700 transition">Save & Export Code</button>
                </div>

                <div class="space-y-20">
                    <!-- Agents Admin -->
                    <div>
                        <h3 class="text-white font-bold mb-6 border-l-4 border-red-600 pl-4 uppercase text-sm">Manage Agents</h3>
                        <div id="admin-char-list" class="space-y-6"></div>
                        <button onclick="addCharEntry()" class="w-full py-4 mt-4 bg-white/5 border border-white/10 text-white text-[10px] font-bold uppercase rounded-xl hover:bg-white/10 transition">+ Add New Agent</button>
                    </div>

                    <!-- Arcs Admin -->
                    <div>
                        <h3 class="text-white font-bold mb-6 border-l-4 border-red-600 pl-4 uppercase text-sm">Manage Arcs</h3>
                        <div id="admin-weapon-list" class="space-y-6"></div>
                        <button onclick="addWeaponEntry()" class="w-full py-4 mt-4 bg-white/5 border border-white/10 text-white text-[10px] font-bold uppercase rounded-xl hover:bg-white/10 transition">+ Add New Arc</button>
                    </div>
                </div>

                <div id="output-area" class="mt-10 hidden">
                    <label class="admin-label">Final Build Output</label>
                    <textarea id="final-code" class="w-full h-64 bg-black text-[10px] p-4 text-gray-500 font-mono border border-white/5" readonly></textarea>
                </div>
            </div>
        </section>
    </main>

    <script id="data-script">
        let characters = [];
        let weapons = [];

        function toggleAccordion(contentId, chevronId) {
            const content = document.getElementById(contentId);
            const chevron = document.getElementById(chevronId);
            content.classList.toggle('open');
            chevron.classList.toggle('rotate-180');
        }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('sect-' + id).classList.add('active');
            const nav = document.getElementById('nav-' + id);
            if(nav && id !== 'char-detail') nav.classList.add('active');
        }

        function adminLogin() { if (prompt("Terminal Key:") === "1234") { renderAdminUI(); showSection('admin'); } }

        function renderAdminUI() {
            // Characters
            const charContainer = document.getElementById('admin-char-list');
            charContainer.innerHTML = '';
            characters.forEach((char, i) => {
                const awk = char.awakening || ["","","","","",""];
                charContainer.innerHTML += `
                <div class="bg-black/30 p-6 rounded-xl border border-white/5 relative">
                    <button onclick="deleteItem('char', ${i})" class="absolute top-4 right-4 text-red-600 text-[9px] font-black uppercase">Remove</button>
                    <div class="grid grid-cols-4 gap-4 mb-4">
                        <div><label class="admin-label">Name</label><input type="text" value="${char.name}" class="edit-char-name admin-input"></div>
                        <div><label class="admin-label">Element</label><input type="text" value="${char.element || ''}" class="edit-char-element admin-input"></div>
                        <div><label class="admin-label">Tier</label><input type="text" value="${char.tier || 'T0'}" class="edit-char-tier admin-input"></div>
                        <div><label class="admin-label">Image URL</label><input type="text" value="${char.img}" class="edit-char-img admin-input"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-4 mb-4">
                        <div><label class="admin-label">Basic</label><textarea class="edit-char-basic admin-input h-20">${char.basic || ''}</textarea></div>
                        <div><label class="admin-label">Skill</label><textarea class="edit-char-skill admin-input h-20">${char.skill || ''}</textarea></div>
                        <div><label class="admin-label">Ultimate</label><textarea class="edit-char-ult admin-input h-20">${char.ult || ''}</textarea></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><label class="admin-label">R1</label><input type="text" value="${char.r1 || ''}" class="edit-char-r1 admin-input"></div>
                        <div><label class="admin-label">R2</label><input type="text" value="${char.r2 || ''}" class="edit-char-r2 admin-input"></div>
                    </div>
                    <div class="grid grid-cols-6 gap-2">
                        ${awk.map((v, idx) => `<input type="text" value="${v}" placeholder="A${idx+1}" class="edit-char-awk-${idx} admin-input">`).join('')}
                    </div>
                </div>`;
            });

            // Weapons
            const weaponContainer = document.getElementById('admin-weapon-list');
            weaponContainer.innerHTML = '';
            weapons.forEach((w, i) => {
                weaponContainer.innerHTML += `
                <div class="bg-black/30 p-6 rounded-xl border border-white/5 relative">
                    <button onclick="deleteItem('weapon', ${i})" class="absolute top-4 right-4 text-red-600 text-[9px] font-black uppercase">Remove</button>
                    <div class="grid grid-cols-3 gap-4 mb-4">
                        <div><label class="admin-label">Arc Name</label><input type="text" value="${w.name}" class="edit-w-name admin-input"></div>
                        <div><label class="admin-label">Stats</label><input type="text" value="${w.stats || ''}" class="edit-w-stats admin-input"></div>
                        <div><label class="admin-label">Image URL</label><input type="text" value="${w.img || ''}" class="edit-w-img admin-input"></div>
                    </div>
                    <div><label class="admin-label">Passive Effect</label><textarea class="edit-w-desc admin-input h-20">${w.desc || ''}</textarea></div>
                </div>`;
            });
        }

        function deleteItem(type, index) {
            if(confirm("Confirm deletion?")) {
                if(type === 'char') characters.splice(index, 1);
                else weapons.splice(index, 1);
                renderAdminUI();
            }
        }

        function addCharEntry() { characters.push({name:"New Agent", awakening:["","","","","",""]}); renderAdminUI(); }
        function addWeaponEntry() { weapons.push({name:"New Arc"}); renderAdminUI(); }

        function commitAllChanges() {
            // Save Characters
            const charDivs = document.querySelectorAll('#admin-char-list > div');
            characters = [];
            charDivs.forEach(div => {
                const awk = [];
                for(let i=0; i<6; i++) awk.push(div.querySelector(`.edit-char-awk-${i}`).value);
                characters.push({
                    name: div.querySelector('.edit-char-name').value,
                    element: div.querySelector('.edit-char-element').value,
                    tier: div.querySelector('.edit-char-tier').value,
                    img: div.querySelector('.edit-char-img').value,
                    basic: div.querySelector('.edit-char-basic').value,
                    skill: div.querySelector('.edit-char-skill').value,
                    ult: div.querySelector('.edit-char-ult').value,
                    r1: div.querySelector('.edit-char-r1').value,
                    r2: div.querySelector('.edit-char-r2').value,
                    awakening: awk
                });
            });

            // Save Weapons
            const weaponDivs = document.querySelectorAll('#admin-weapon-list > div');
            weapons = [];
            weaponDivs.forEach(div => {
                weapons.push({
                    name: div.querySelector('.edit-w-name').value,
                    stats: div.querySelector('.edit-w-stats').value,
                    img: div.querySelector('.edit-w-img').value,
                    desc: div.querySelector('.edit-w-desc').value
                });
            });

            updateSiteContent();
            document.getElementById('output-area').classList.remove('hidden');
            document.getElementById('final-code').value = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            alert("Terminal Synced.");
        }

        function updateSiteContent() {
            const charGrid = document.getElementById('char-grid');
            charGrid.innerHTML = '';
            characters.forEach((char, index) => {
                charGrid.innerHTML += `<div onclick="viewChar(${index})" class="bg-[#16181b] border border-white/5 rounded-lg overflow-hidden cursor-pointer hover:border-red-600 transition"><img src="${char.img}" class="aspect-[3/4] object-cover w-full"><div class="p-3 text-center text-[10px] font-bold text-white uppercase">${char.name}</div></div>`;
            });

            const weaponGrid = document.getElementById('weapon-grid');
            weaponGrid.innerHTML = '';
            weapons.forEach(w => {
                weaponGrid.innerHTML += `<div class="bg-[#16181b] p-6 rounded-xl border border-white/5"><img src="${w.img}" class="h-32 w-full object-contain mb-4"><h4 class="text-white font-bold uppercase text-sm mb-1">${w.name}</h4><div class="text-red-500 text-[10px] font-bold mb-3">${w.stats}</div><p class="text-xs text-gray-500 leading-relaxed">${w.desc}</p></div>`;
            });
        }

        function viewChar(index) {
            const char = characters[index];
            const detail = document.getElementById('detail-view');
            detail.innerHTML = `
                <div class="bg-[#1a1c1e] rounded-2xl overflow-hidden border border-white/5 flex flex-col md:flex-row max-w-6xl shadow-2xl mb-10">
                    <div class="md:w-2/5 bg-[#090a0c] h-[400px] overflow-hidden"><img src="${char.img}" class="w-full h-full object-cover"></div>
                    <div class="p-10 md:w-3/5 flex flex-col justify-center">
                        <h3 class="nte-title text-6xl text-white mb-4 tracking-tighter uppercase">${char.name}</h3>
                        <div class="flex gap-4 text-[10px] font-bold text-red-500 uppercase mb-6">${char.element} // ${char.tier}</div>
                    </div>
                </div>
                <div class="max-w-6xl space-y-4">
                    <!-- Abilities -->
                    <div class="bg-[#1a1c1e] border border-white/5 rounded-xl p-6">
                        <div class="collapsible-trigger" onclick="toggleAccordion('sk-c','sk-v')">
                            <h4 class="nte-title text-lg text-white uppercase tracking-widest border-l-4 border-red-600 pl-4">Abilities</h4>
                            <svg id="sk-v" class="chevron w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </div>
                        <div id="sk-c" class="collapsible-content">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-4">
                                <div class="bg-white/5 p-4 rounded-lg"><span class="text-red-500 text-[9px] font-black uppercase block mb-2">Basic</span><p class="text-sm text-gray-400">${char.basic}</p></div>
                                <div class="bg-white/5 p-4 rounded-lg"><span class="text-red-500 text-[9px] font-black uppercase block mb-2">Skill</span><p class="text-sm text-gray-400">${char.skill}</p></div>
                                <div class="bg-white/5 p-4 rounded-lg"><span class="text-red-500 text-[9px] font-black uppercase block mb-2">Ultimate</span><p class="text-sm text-gray-400">${char.ult}</p></div>
                            </div>
                        </div>
                    </div>
                    <!-- Awakening -->
                    <div class="bg-[#1a1c1e] border border-white/5 rounded-xl p-6">
                        <div class="collapsible-trigger" onclick="toggleAccordion('awk-c','awk-v')">
                            <h4 class="nte-title text-lg text-white uppercase tracking-widest border-l-4 border-red-600 pl-4">Awakening</h4>
                            <svg id="awk-v" class="chevron w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </div>
                        <div id="awk-c" class="collapsible-content">
                            <div class="space-y-3 pt-4">
                                ${char.awakening.map((a, i) => a.trim() ? `<div class="flex gap-4 bg-white/5 p-3 rounded-lg"><span class="text-red-600 font-black text-sm">A${i+1}</span><span class="text-sm">${a}</span></div>` : '').join('')}
                            </div>
                        </div>
                    </div>
                </div>`;
            showSection('char-detail');
        }

        window.onload = updateSiteContent;
    </script>
</body>
</html>
