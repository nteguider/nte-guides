<aside class="sidebar flex flex-col">
    <div class="p-6 mb-2">
        <h1 class="nte-title text-2xl text-white tracking-widest border-b-2 border-red-600 pb-1 inline-block">NTE</h1>
    </div>
    <nav class="flex-grow">
        <div class="nav-label">Main Console</div>
        <div onclick="showSection('home')" id="nav-home" class="nav-link active">Home</div>
        <div class="nav-label">Archives</div>
        <div onclick="showSection('characters')" id="nav-characters" class="nav-link">Characters</div>
        <div onclick="showSection('weapons')" id="nav-weapons" class="nav-link">Weapons</div>
        <div onclick="showSection('tierlist')" id="nav-tierlist" class="nav-link">Tier List</div>
    </nav>
    <div class="p-6 border-t border-white/5 text-center">
        <button onclick="adminLogin()" class="text-[10px] text-gray-800 hover:text-red-500 font-bold uppercase tracking-widest transition">System Admin</button>
    </div>
</aside>

<main class="main-content">
    <!-- СЕКЦИЯ ПЛИТОК (CHARACTERS) -->
    <section id="sect-characters" class="content-section">
        <h2 class="nte-title text-2xl text-white mb-8 uppercase tracking-widest">Database Entities</h2>
        <div id="char-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <!-- Плитки генерируются здесь -->
        </div>
    </section>

    <!-- СЕКЦИЯ ДЕТАЛЬНОГО ПРОФИЛЯ -->
    <section id="sect-char-detail" class="content-section">
        <button onclick="showSection('characters')" class="mb-6 text-red-500 text-[10px] font-bold uppercase tracking-widest hover:text-white transition">← Back to Grid</button>
        <div id="char-profile-card" class="bg-[#1a1c1e] rounded-2xl overflow-hidden border border-white/5 flex flex-col md:flex-row max-w-5xl shadow-2xl">
            <div class="md:w-2/5 bg-gray-900 h-[550px] overflow-hidden relative">
                <img id="char-img-display" src="" class="w-full h-full object-cover">
                <div id="char-element-overlay" class="absolute top-4 left-4 bg-black/60 p-2 rounded-lg text-[10px] font-bold text-white uppercase tracking-widest"></div>
            </div>
            <div class="p-12 md:w-3/5 flex flex-col justify-center">
                <span id="char-tier-badge" class="text-white text-[11px] font-black px-4 py-1 rounded-full w-fit uppercase tracking-widest"></span>
                <h3 id="char-name-display" class="nte-title text-6xl text-white my-6 tracking-tighter uppercase"></h3>
                <div id="char-desc-display" class="text-gray-400 leading-relaxed text-xl font-light border-l-2 border-red-600/30 pl-6 italic"></div>
            </div>
        </div>
    </section>

    <!-- ОСТАЛЬНЫЕ СЕКЦИИ (WEAPONS, TIERLIST, ADMIN) СОХРАНЯЮТСЯ -->
    <!-- ... (код секций из прошлого ответа) ... -->
</main>

<script id="data-script">
    let characters = []; // Сюда попадут данные после сохранения
    let weapons = [];

    // --- Логика отображения ---
    function updateSiteContent() {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = '';
        
        characters.forEach((char, index) => {
            grid.innerHTML += `
                <div onclick="viewChar(${index})" class="relative group cursor-pointer bg-[#16181b] border border-white/5 rounded-lg overflow-hidden transition-transform hover:scale-105 hover:border-red-600">
                    <div class="aspect-[3/4] bg-gray-800">
                        <img src="${char.img}" class="w-full h-full object-cover">
                    </div>
                    <div class="absolute top-2 left-2 flex gap-1">
                        <div class="bg-black/80 p-1 rounded text-[8px] font-bold text-white uppercase">${char.element || '??'}</div>
                        <div class="bg-black/80 p-1 rounded text-[8px] font-bold text-white uppercase">${char.class || '??'}</div>
                    </div>
                    <div class="p-3 bg-gradient-to-t from-black to-transparent">
                        <div class="text-white text-[10px] font-bold uppercase tracking-widest truncate">${char.name}</div>
                    </div>
                </div>
            `;
        });
        
        // Обновление тир-листа и оружия (как раньше)
        renderTierList();
        renderWeapons();
    }

    function viewChar(index) {
        const char = characters[index];
        document.getElementById('char-name-display').innerText = char.name;
        document.getElementById('char-desc-display').innerText = char.desc;
        document.getElementById('char-img-display').src = char.img;
        document.getElementById('char-element-overlay').innerText = `${char.element} | ${char.class}`;
        
        const badge = document.getElementById('char-tier-badge');
        badge.innerText = char.tier;
        badge.className = `t${char.tier.replace('.','')} text-white text-[11px] font-black px-4 py-1 rounded-full w-fit uppercase tracking-widest`;
        
        showSection('char-detail');
    }

    // --- Логика Админки (теперь с полями Element и Class) ---
    function renderAdminUI() {
        const container = document.getElementById('admin-char-list');
        container.innerHTML = '';
        characters.forEach((char, i) => {
            container.innerHTML += `
                <div class="bg-black/30 p-4 rounded-lg border border-white/5 mb-4">
                    <input type="text" value="${char.name}" placeholder="Name" class="edit-char-name w-full bg-transparent border-b border-white/10 mb-2 text-white">
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="text" value="${char.element || ''}" placeholder="Element" class="edit-char-element bg-black/40 p-1 text-[10px] text-white">
                        <input type="text" value="${char.class || ''}" placeholder="Class" class="edit-char-class bg-black/40 p-1 text-[10px] text-white">
                    </div>
                    <!-- остальные поля (tier, img, desc) -->
                </div>
            `;
        });
    }
    
    // ... Остальные функции сохранения ...
</script>
