<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NTE Guide Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --theme-color: #ff3e3e;
      --sidebar-bg: #121317;
      --hover-bg: #1c1e23;
    }

    /* Стили сайдбара */
    .sidebar { background-color: var(--sidebar-bg) !important; border-right: 1px solid #2d2f34; }
    
    /* Стилизация кнопок в меню */
    .sidebar-nav ul li a {
      display: flex !important;
      align-items: center;
      padding: 14px 20px !important;
      color: #b9bbbe !important;
      font-size: 15px !important;
      text-decoration: none !important;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }

    .sidebar-nav ul li a:hover {
      background: var(--hover-bg);
      color: #fff !important;
    }

    .sidebar-nav li.active > a {
      background: var(--hover-bg);
      color: #fff !important;
      border-left-color: var(--theme-color);
    }

    .sidebar-nav i {
      margin-right: 15px;
      width: 20px;
      text-align: center;
      font-size: 18px;
    }

    /* Убираем стандартные маркеры Docsify */
    .sidebar-nav ul { margin: 0; padding: 0; list-style: none; }
  </style>
</head>
<body>
  <div id="app">Loading Hesperia Archives...</div>
  <script>
    window.$docsify = {
      name: 'NTE Guide',
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      // Настройка для корректного отображения иконок
      executeScript: true
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
