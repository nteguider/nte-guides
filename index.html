<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTE | Hesperia Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f1113; color: #d1d5db; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        .nte-title { font-family: 'Orbitron', sans-serif; }
        
        /* Sidebar for Desktop */
        .sidebar { width: 260px; background-color: #090a0c; border-right: 1px solid #1e2124; flex-shrink: 0; position: sticky; top: 0; height: 100vh; display: none; }
        
        /* Bottom Nav for Mobile */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #090a0c; border-top: 1px solid #1e2124; display: flex; justify-content: space-around; padding: 10px; z-index: 100; }
        .nav-item { color: #9ca3af; font-size: 10px; font-weight: 800; text-transform: uppercase; text-align: center; flex: 1; }
        .nav-item.active { color: #ef4444; }

        @media (min-width: 768px) {
            body { flex-direction: row; }
            .sidebar { display: flex; }
            .bottom-nav { display: none; }
        }

        .nav-link { padding: 0.8rem 1.5rem; display: block; transition: 0.2s; cursor: pointer; color: #9ca3af; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
        .nav-link.active { color: #ffffff; background: #16181b; border-right: 3px solid #ef4444; }

        .main-content { flex-grow: 1; padding: 1.5rem; padding-bottom: 80px; overflow-y: auto; background-color: #111315; width: 100%; }
        @media (min-width: 768px) { .main-content { padding: 2.5rem; } }

        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, opacity 0.2s; opacity: 0; }
        .collapsible-content.open { max-height: 3000px; opacity: 1; margin-top: 1.5rem; }
        .chevron { transition: transform 0.3s; }
        .rotate-180 { transform: rotate(180deg); }

        .admin-input { background: #0f1113; border: 1px solid #1e2124; color: white; padding: 12px; font-size: 14px; border-radius: 8px; width: 100%; outline: none; }
        .admin-label { font-size: 10px; font-weight: 800; color: #ef4444; text-transform: uppercase; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <!-- Desktop Sidebar -->
    <aside class="sidebar flex flex-col">
        <div class="p-6">
            <h1 class="nte-title text-2xl text-white tracking-widest border-b-2 border-red-600 pb-1 inline-block">NTE</h1>
        </div>
        <nav class="flex-grow">
            <div onclick="showSection('home')" id="nav-home" class="nav-link active">Home</div>
            <div onclick="showSection('characters')" id="nav-characters" class="nav-link">Characters</div>
            <div onclick="showSection('weapons')" id="nav-weapons" class="nav-link">Arcs</div>
            <div onclick="showSection('tierlist')" id="nav-tierlist" class="nav-link">Tier List</div>
        </nav>
        <button onclick="adminLogin()" class="p-6 text-[10px] text-gray-800 hover:text-red-500 font-bold uppercase tracking-widest transition">Admin Access</button>
    </aside>

    <!-- Mobile Bottom Nav -->
    <div class="bottom-nav">
        <div onclick="showSection('home')" id="m-nav-home" class="nav-item active">Home</div>
        <div onclick="showSection('characters')" id="m-nav-characters" class="nav-item">Agents</div>
        <div onclick="showSection('weapons')" id="m-nav-weapons" class="nav-item">Arcs</div>
        <div onclick="showSection('tierlist')" id="m-nav-tierlist" class="nav-item">Tier</div>
    </div>

    <main class="main-content">
        <section id="sect-home" class="content-section active py-10 md:py-20 text-center">
            <h2 class="nte-title text-3xl md:text-5xl text-white mb-6 uppercase tracking-tighter">HESPERIA ARCHIVES</h2>
            <div class="w-16 h-1 bg-red-600 mx-auto"></div>
        </section>

        <!-- Characters Grid -->
        <section id="sect-characters" class="content-section">
            <h2 class="nte-title text-xl text-white mb-8 uppercase tracking-widest border-l-4 border-red-600 pl-4">Personnel</h2>
            <div id="char-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-4"></div>
        </section>

        <!-- Weapons Grid -->
        <section id="sect-weapons" class="content-section">
            <h2 class="nte-title text-xl text-white mb-8 uppercase tracking-widest border-l-4 border-red-600 pl-4">Arcs</h2>
            <div id="weapon-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
        </section>

        <!-- Tier List -->
        <section id="sect-tierlist" class="content-section">
            <h2 class="nte-title text-xl text-white mb-10 uppercase tracking-widest border-l-4 border-red-600 pl-4">Tactical</h2>
            <div id="tier-scroll-container" class="flex md:grid md:grid-cols-5 gap-4 overflow-x-auto pb-6 md:pb-0">
                <!-- Tiers will be rendered here -->
            </div>
        </section>

        <!-- Details -->
        <section id="sect-char-detail" class="content-section">
            <button onclick="showSection('characters')" class="mb-6 text-red-500 text-[10px] font-bold uppercase tracking-widest flex items-center gap-2"><span>&larr;</span> Return</button>
            <div id="detail-view"></div>
        </section>

        <!-- Admin -->
        <section id="sect-admin" class="content-section">
            <div class="max-w-6xl bg-[#1a1c1e] p-4 md:p-10 rounded-2xl border border-red-600/20 shadow-2xl">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-10">
                    <h2 class="nte-title text-lg text-white uppercase tracking-widest">Database Edit</h2>
                    <button onclick="commitAllChanges()" class="w-full md:w-auto bg-red-600 text-white px-8 py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest">Save & Export</button>
                </div>
                
                <div class="space-y-12">
                    <div>
                        <h3 class="text-white font-bold mb-4 uppercase text-xs">Agents</h3>
                        <div id="admin-char-list" class="space-y-4"></div>
                        <button onclick="addCharEntry()" class="w-full py-4 mt-4 bg-white/5 border border-white/10 text-white text-[10px] font-bold uppercase rounded-xl">+ Add Agent</button>
                    </div>
                </div>
                <div id="output-area" class="mt-10 hidden">
                    <textarea id="final-code" class="w-full h-64 bg-black text-[10px] p-4 text-gray-500 font-mono" readonly></textarea>
                </div>
            </div>
        </section>
    </main>

    <script id="data-script">
        let characters = [];
        let weapons = [];

        function toggleAccordion(contentId, chevronId) {
            const content = document.getElementById(contentId);
            const chevron = document.getElementById(chevronId);
            content.classList.toggle('open');
            chevron.classList.toggle('rotate-180');
        }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link, .nav-item').forEach(l => l.classList.remove('active'));
            
            document.getElementById('sect-' + id).classList.add('active');
            
            const nav = document.getElementById('nav-' + id);
            const mNav = document.getElementById('m-nav-' + id);
            if(nav) nav.classList.add('active');
            if(mNav) mNav.classList.add('active');
            
            window.scrollTo(0,0);
        }

        function adminLogin() { if (prompt("Key:") === "1234") { renderAdminUI(); showSection('admin'); } }

        function renderAdminUI() {
            const charContainer = document.getElementById('admin-char-list');
            charContainer.innerHTML = '';
            characters.forEach((char, i) => {
                charContainer.innerHTML += `
                <div class="bg-black/30 p-4 md:p-6 rounded-xl border border-white/5 relative">
                    <button onclick="deleteItem('char', ${i})" class="absolute top-4 right-4 text-red-600 text-[10px] font-black uppercase">Del</button>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                        <div><label class="admin-label">Name</label><input type="text" value="${char.name}" class="edit-char-name admin-input"></div>
                        <div><label class="admin-label">Element</label><input type="text" value="${char.element || ''}" class="edit-char-element admin-input"></div>
                        <div><label class="admin-label">Tier</label><input type="text" value="${char.tier || ''}" class="edit-char-tier admin-input"></div>
                        <div><label class="admin-label">Img URL</label><input type="text" value="${char.img}" class="edit-char-img admin-input"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <textarea class="edit-char-basic admin-input h-20" placeholder="Basic">${char.basic || ''}</textarea>
                        <textarea class="edit-char-skill admin-input h-20" placeholder="Skill">${char.skill || ''}</textarea>
                        <textarea class="edit-char-ult admin-input h-20" placeholder="Ult">${char.ult || ''}</textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                        <textarea class="edit-char-r1 admin-input h-16" placeholder="R1">${char.r1 || ''}</textarea>
                        <textarea class="edit-char-r2 admin-input h-16" placeholder="R2">${char.r2 || ''}</textarea>
                    </div>
                </div>`;
            });
        }

        function deleteItem(type, index) {
            if(confirm("Delete?")) {
                if(type === 'char') characters.splice(index, 1);
                renderAdminUI();
            }
        }

        function addCharEntry() { characters.push({name:"New", awakening:["","","","","",""]}); renderAdminUI(); }

        function commitAllChanges() {
            const charDivs = document.querySelectorAll('#admin-char-list > div');
            characters = [];
            charDivs.forEach(div => {
                characters.push({
                    name: div.querySelector('.edit-char-name').value,
                    element: div.querySelector('.edit-char-element').value,
                    tier: div.querySelector('.edit-char-tier').value,
                    img: div.querySelector('.edit-char-img').value,
                    basic: div.querySelector('.edit-char-basic').value,
                    skill: div.querySelector('.edit-char-skill').value,
                    ult: div.querySelector('.edit-char-ult').value,
                    r1: div.querySelector('.edit-char-r1').value,
                    r2: div.querySelector('.edit-char-r2').value,
                    awakening: ["","","","","",""] 
                });
            });
            updateSiteContent();
            document.getElementById('output-area').classList.remove('hidden');
            document.getElementById('final-code').value = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        }

        function updateSiteContent() {
            const charGrid = document.getElementById('char-grid');
            charGrid.innerHTML = '';
            characters.forEach((char, index) => {
                charGrid.innerHTML += `<div onclick="viewChar(${index})" class="bg-[#16181b] border border-white/5 rounded-lg overflow-hidden cursor-pointer hover:border-red-600 transition"><img src="${char.img}" class="aspect-[3/4] object-cover w-full"><div class="p-3 text-center text-[10px] font-bold text-white uppercase">${char.name}</div></div>`;
            });
        }

        function viewChar(index) {
            const char = characters[index];
            const detail = document.getElementById('detail-view');
            detail.innerHTML = `
                <div class="bg-[#1a1c1e] rounded-2xl overflow-hidden border border-white/5 flex flex-col md:flex-row max-w-6xl shadow-2xl mb-6">
                    <div class="md:w-2/5 bg-[#090a0c] h-[300px] md:h-[400px] overflow-hidden"><img src="${char.img}" class="w-full h-full object-cover"></div>
                    <div class="p-6 md:p-10 md:w-3/5 flex flex-col justify-center">
                        <h3 class="nte-title text-4xl md:text-6xl text-white mb-2 uppercase">${char.name}</h3>
                        <div class="text-[10px] font-bold text-red-500 uppercase">${char.element} // ${char.tier}</div>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="bg-[#1a1c1e] border border-white/5 rounded-xl p-4 md:p-6">
                        <div class="collapsible-trigger" onclick="toggleAccordion('res-c','res-v')">
                            <h4 class="nte-title text-white uppercase tracking-widest border-l-4 border-red-600 pl-4">Resonance</h4>
                            <svg id="res-v" class="chevron w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </div>
                        <div id="res-c" class="collapsible-content">
                            <div class="space-y-4 pt-4">
                                <div class="bg-white/5 p-4 rounded-lg flex gap-4"><span class="text-red-500 font-black">R1</span><p class="text-sm text-gray-400">${char.r1 || "N/A"}</p></div>
                                <div class="bg-white/5 p-4 rounded-lg flex gap-4"><span class="text-red-500 font-black">R2</span><p class="text-sm text-gray-400">${char.r2 || "N/A"}</p></div>
                            </div>
                        </div>
                    </div>
                </div>`;
            showSection('char-detail');
        }

        window.onload = updateSiteContent;
    </script>
</body>
</html>
