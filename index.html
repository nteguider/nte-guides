<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>NTE Guide Hub | База данных Хесперии</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Основная темная тема Docsify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    /* Настройки стилей под эстетику Neverness to Everness */
    :root {
      --theme-color: #ff3e3e; /* Основной красный цвет игры */
      --sidebar-background: #121212;
      --content-background: #1a1a1a;
    }

    body {
      background-color: var(--content-background);
    }

    .sidebar {
      background-color: var(--sidebar-background);
      border-right: 1px solid #333;
    }

    /* Стили для кнопок-плашек на главной странице */
    .btn-container {
      display: flex;
      gap: 15px;
      margin: 25px 0;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 14px 28px;
      border-radius: 4px;
      font-weight: 800;
      text-transform: uppercase;
      text-decoration: none !important;
      letter-spacing: 1px;
      transition: all 0.2s ease-in-out;
      display: inline-block;
      min-width: 150px;
      text-align: center;
      border: none;
      cursor: pointer;
    }

    .btn-red {
      background: #ff3e3e;
      color: #fff !important;
    }

    .btn-gold {
      background: #d4af37;
      color: #000 !important;
    }

    .btn-outline {
      border: 2px solid #ff3e3e;
      color: #ff3e3e !important;
      padding: 12px 26px;
    }

    .nav-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
      filter: brightness(1.1);
    }

    /* Кастомизация поиска */
    .search input {
      background: #252525 !important;
      border-radius: 8px !important;
      border: 1px solid #444 !important;
    }
  </style>
</head>
<body>
  <div id="app">Загрузка архивов Хесперии...</div>
  
  <script>
    window.$docsify = {
      name: 'NTE Guide',
      // Ссылка на ваш репозиторий (необязательно)
      repo: '', 
      
      // Навигация
      loadSidebar: true,   // Загружать _sidebar.md
      auto2top: true,      // Скролл вверх при смене страницы
      homepage: 'README.md', // ПРИНУДИТЕЛЬНАЯ ГЛАВНАЯ (решает проблему 404)
      
      // Поиск
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Поиск по базе...',
        noData: 'Ничего не найдено',
        depth: 6
      }
    }
  </script>

  <!-- Движок Docsify -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Плагины -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
