<style>
  /* Сетка главной страницы */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 20px;
    padding: 20px 0;
  }

  /* Общий стиль виджета */
  .widget {
    background: #232530;
    border: 1px solid #323645;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .widget-header {
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    font-size: 1.25rem;
    font-weight: 700;
    background: rgba(255, 255, 255, 0.03);
  }

  .widget-content {
    padding: 20px;
    flex-grow: 1;
  }

  .widget-footer {
    padding: 15px;
    background: #2b2e3c;
    text-align: center;
    font-size: 0.9rem;
    border-top: 1px solid #323645;
  }

  .widget-footer a {
    color: #b9bbbe !important;
    text-decoration: none !important;
  }

  /* Сетка иконок в блоке Welcome */
  .icon-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 15px;
  }

  .icon-item {
    background: #1a1b23;
    border-radius: 8px;
    padding: 10px 5px;
    text-align: center;
    font-size: 0.75rem;
    transition: transform 0.2s;
  }

  .icon-item:hover { transform: translateY(-3px); background: #2d2f3b; }

  .icon-item img {
    width: 100%;
    border-radius: 4px;
    margin-bottom: 5px;
  }

  /* Промо-баннер */
  .promo-banner {
    width: 100%;
    border-radius: 8px;
    display: block;
  }

  /* Список кодов и событий */
  .data-list { list-style: none !important; padding: 0 !important; margin: 0; }
  .data-item {
    background: #1a1b23;
    margin-bottom: 8px;
    padding: 12px;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
  }

  .code-text { font-family: monospace; color: #ff3e3e; font-weight: bold; }
</style>
