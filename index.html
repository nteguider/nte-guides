<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NTE Guide Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    :root {
      --theme-color: #ff3e3e;
      --sidebar-background: #121212;
      --content-background: #1a1a1a;
    }

    body { background-color: var(--content-background); }
    .sidebar { background-color: var(--sidebar-background); border-right: 1px solid #333; }

    /* Стили для кнопок в боковом меню */
    .sidebar-nav li > a {
      margin: 10px 15px;
      padding: 12px;
      border-radius: 4px;
      text-align: center;
      font-weight: bold;
      text-transform: uppercase;
      display: block;
      transition: all 0.2s ease;
      text-decoration: none !important;
    }

    /* Кнопка Characters (Red) */
    .sidebar-nav a[href="#/characters"] {
      background-color: #ff3e3e !important;
      color: white !important;
    }

    /* Кнопка Tier List (Gold) */
    .sidebar-nav a[href="#/tier-list"] {
      background-color: #d4af37 !important;
      color: black !important;
    }

    /* Кнопка Arcs (Outline) */
    .sidebar-nav a[href="#/arcs"] {
      border: 2px solid #ff3e3e !important;
      color: #ff3e3e !important;
    }

    .sidebar-nav a:hover {
      transform: scale(1.05);
      filter: brightness(1.2);
    }
    
    /* Кнопки на главной странице */
    .btn-container { display: flex; gap: 15px; margin: 25px 0; flex-wrap: wrap; }
    .nav-btn { padding: 14px 28px; border-radius: 4px; font-weight: 800; text-transform: uppercase; text-decoration: none !important; display: inline-block; min-width: 150px; text-align: center; }
    .btn-red { background: #ff3e3e; color: white !important; }
    .btn-gold { background: #d4af37; color: black !important; }
    .btn-outline { border: 2px solid #ff3e3e; color: #ff3e3e !important; }
  </style>
</head>
<body>
  <div id="app">Accessing Hesperia Archives...</div>
  <script>
    window.$docsify = {
      name: 'NTE Guide',
      loadSidebar: true, // Обязательно для работы левого меню
      auto2top: true,
      homepage: 'README.md'
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
