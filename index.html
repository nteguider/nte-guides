<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTE | Hesperia Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f1113; color: #d1d5db; font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; margin: 0; }
        .nte-title { font-family: 'Orbitron', sans-serif; }
        .sidebar { width: 260px; background-color: #090a0c; border-right: 1px solid #1e2124; flex-shrink: 0; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; z-index: 10; }
        .nav-link { padding: 0.8rem 1.5rem; display: block; transition: 0.2s; cursor: pointer; color: #9ca3af; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .nav-link:hover { color: #ffffff; background: #16181b; }
        .nav-link.active { color: #ffffff; background: #16181b; border-right: 3px solid #ef4444; }
        .main-content { flex-grow: 1; padding: 2.5rem; background-color: #111315; min-height: 100vh; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, opacity 0.2s; opacity: 0; }
        .collapsible-content.open { max-height: 3000px; opacity: 1; margin-top: 1rem; }
        .admin-input { background: #0f1113; border: 1px solid #1e2124; color: white; padding: 10px; font-size: 12px; border-radius: 4px; width: 100%; outline: none; }
        .admin-label { font-size: 9px; font-weight: 800; color: #ef4444; text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        .tier-row { background: #16181b; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; margin-bottom: 1rem; overflow: hidden; }
        .tier-label { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900; font-size: 1.5rem; flex-shrink: 0; }
        .t-t0 { background: #ef4444; color: white; }
        .t-t05 { background: #f97316; color: white; }
        .t-t1 { background: #facc15; color: black; }
        .t-t2 { background: #4ade80; color: black; }
        .t-t3 { background: #3b82f6; color: white; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="p-6 mb-4"><h1 class="nte-title text-2xl text-white border-b-2 border-red-600 pb-1 inline-block">NTE</h1></div>
        <nav class="flex-grow">
            <div onclick="showSection('home')" id="nav-home" class="nav-link active">Home</div>
            <div onclick="showSection('characters')" id="nav-characters" class="nav-link">Characters</div>
            <div onclick="showSection('weapons')" id="nav-weapons" class="nav-link">Arcs</div>
            <div onclick="showSection('tierlist')" id="nav-tierlist" class="nav-link">Tier List</div>
        </nav>
        <div class="p-6 border-t border-white/5"><button onclick="adminLogin()" class="text-[10px] text-gray-700 hover:text-red-500 font-bold uppercase tracking-widest">Admin Control</button></div>
    </aside>

    <main class="main-content">
        <section id="sect-home" class="content-section active">
            <div class="text-center py-12 mb-10">
                <h2 class="nte-title text-6xl text-white mb-6 uppercase">Hesperia Archives</h2>
                <div class="w-24 h-1 bg-red-600 mx-auto"></div>
            </div>
            
            <div class="max-w-4xl mx-auto">
                <h3 class="nte-title text-xl text-white mb-6 border-l-4 border-red-600 pl-4 uppercase">Latest Updates</h3>
                <div id="home-updates" class="space-y-4"></div>
            </div>
        </section>

        <section id="sect-characters" class="content-section">
            <h2 class="nte-title text-2xl text-white mb-8 border-l-4 border-red-600 pl-4 uppercase">Personnel</h2>
            <div id="char-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </section>

        <section id="sect-weapons" class="content-section">
            <h2 class="nte-title text-2xl text-white mb-8 border-l-4 border-red-600 pl-4 uppercase">Arcs Catalog</h2>
            <div id="weapon-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="sect-tierlist" class="content-section">
            <h2 class="nte-title text-2xl text-white mb-8 border-l-4 border-red-600 pl-4 uppercase">Tactical Rankings</h2>
            <div id="tier-list-container" class="space-y-4"></div>
        </section>

        <section id="sect-char-detail" class="content-section">
            <button onclick="showSection('characters')" class="mb-6 text-red-500 text-[10px] font-bold uppercase tracking-widest flex items-center gap-2"><span>&larr;</span> Return</button>
            <div id="detail-view"></div>
        </section>

        <section id="sect-admin" class="content-section">
            <div class="max-w-6xl bg-[#1a1c1e] p-10 rounded-2xl border border-red-600/20 shadow-2xl">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="nte-title text-xl text-white uppercase">Database Sync</h2>
                    <button onclick="commitAllChanges()" class="bg-red-600 text-white px-8 py-3 rounded-xl font-bold uppercase text-[10px]">Commit Changes</button>
                </div>

                <div class="mb-12">
                    <h3 class="text-white font-bold mb-4 uppercase text-sm border-b border-white/5 pb-2">Site News</h3>
                    <div id="admin-update-list" class="space-y-4"></div>
                    <button onclick="addUpdateEntry()" class="w-full py-3 mt-4 bg-white/5 border border-white/10 text-white text-[10px] font-bold uppercase rounded-xl">+ Add News</button>
                </div>

                <div id="admin-char-list" class="space-y-8"></div>
                <button onclick="addCharEntry()" class="w-full py-4 mt-8 bg-white/5 border border-white/10 text-white text-[10px] font-bold uppercase rounded-xl">+ Add Agent</button>
                
                <div class="mt-12">
                    <h3 class="text-white font-bold mb-4 uppercase text-sm border-b border-white/5 pb-2">Arcs Configuration</h3>
                    <div id="admin-weapon-list" class="space-y-6"></div>
                    <button onclick="addWeaponEntry()" class="w-full py-4 mt-4 bg-white/5 border border-white/10 text-white text-[10px] font-bold uppercase rounded-xl">+ Add Arc</button>
                </div>

                <div id="output-area" class="mt-10 hidden">
                    <textarea id="final-code" class="w-full h-64 bg-black text-[10px] p-4 text-gray-500 font-mono" readonly></textarea>
                </div>
            </div>
        </section>
    </main>

    <script id="data-script">
        let characters = []; 
        let weapons = [];
        let updates = [];

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const sect = document.getElementById('sect-' + id);
            if(sect) sect.classList.add('active');
            const nav = document.getElementById('nav-' + id);
            if(nav) nav.classList.add('active');
            window.scrollTo(0,0);
        }

        function toggleAccordion(id) { document.getElementById(id).classList.toggle('open'); }
        function adminLogin() { if (prompt("Key:") === "1234") { renderAdminUI(); showSection('admin'); } }

        function renderAdminUI() {
            // Updates
            document.getElementById('admin-update-list').innerHTML = updates.map((upd, i) => `
                <div class="flex gap-4 bg-black/20 p-4 rounded-lg">
                    <input type="text" value="${upd.date}" class="edit-upd-date admin-input w-32">
                    <textarea class="edit-upd-text admin-input h-12 flex-grow">${upd.text}</textarea>
                    <button onclick="deleteItem('update', ${i})" class="text-red-600 font-bold p-2 text-xs">✕</button>
                </div>`).join('');

            // Characters (Восстановил все скиллы)
            document.getElementById('admin-char-list').innerHTML = characters.map((char, i) => `
                <div class="bg-black/40 p-6 rounded-xl border border-white/5 relative">
                    <button onclick="deleteItem('char', ${i})" class="absolute top-4 right-4 text-red-600 text-[10px] font-bold uppercase">Remove</button>
                    <div class="grid grid-cols-4 gap-4 mb-4">
                        <div><label class="admin-label">Name</label><input type="text" value="${char.name}" class="edit-char-name admin-input"></div>
                        <div><label class="admin-label">Element</label><input type="text" value="${char.element || ''}" class="edit-char-element admin-input"></div>
                        <div><label class="admin-label">Tier</label><input type="text" value="${char.tier || ''}" class="edit-char-tier admin-input"></div>
                        <div><label class="admin-label">Img URL</label><input type="text" value="${char.img || ''}" class="edit-char-img admin-input"></div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-4 mb-4">
                        <div><label class="admin-label">Basic</label><textarea class="edit-char-basic admin-input h-20">${char.basic || ''}</textarea></div>
                        <div><label class="admin-label">Skill</label><textarea class="edit-char-skill admin-input h-20">${char.skill || ''}</textarea></div>
                        <div><label class="admin-label">Ult</label><textarea class="edit-char-ult admin-input h-20">${char.ult || ''}</textarea></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><label class="admin-label">R1</label><textarea class="edit-char-r1 admin-input h-20">${char.r1 || ''}</textarea></div>
                        <div><label class="admin-label">R2</label><textarea class="edit-char-r2 admin-input h-20">${char.r2 || ''}</textarea></div>
                    </div>

                    <div class="grid grid-cols-6 gap-2">
                        ${(char.awakening || ["","","","","",""]).map((v, idx) => `<div><label class="admin-label">A${idx+1}</label><input type="text" value="${v}" class="edit-char-awk-${idx} admin-input"></div>`).join('')}
                    </div>
                </div>`).join('');

            // Arcs (Weapons)
            document.getElementById('admin-weapon-list').innerHTML = weapons.map((w, i) => `
                <div class="bg-black/40 p-6 rounded-xl border border-white/5 relative">
                    <button onclick="deleteItem('weapon', ${i})" class="absolute top-4 right-4 text-red-600 text-[10px] font-bold uppercase">Remove</button>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><label class="admin-label">Arc Name</label><input type="text" value="${w.name}" class="edit-w-name admin-input"></div>
                        <div><label class="admin-label">Img URL</label><input type="text" value="${w.img || ''}" class="edit-w-img admin-input"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><label class="admin-label">Base ATK (Value only)</label><input type="text" value="${w.atkValue || ''}" class="edit-w-atk admin-input" placeholder="e.g. 451"></div>
                        <div><label class="admin-label">Substat (Full text)</label><input type="text" value="${w.subStat || ''}" class="edit-w-sub admin-input" placeholder="e.g. Crit Rate 10%"></div>
                    </div>
                    <label class="admin-label">Passive Effect</label>
                    <textarea class="edit-w-desc admin-input h-24">${w.desc || ''}</textarea>
                </div>`).join('');
        }

        function addUpdateEntry() { updates.unshift({date: new Date().toLocaleDateString(), text: "New site update..."}); renderAdminUI(); }
        function addCharEntry() { characters.push({name: "New Agent", awakening: ["","","","","",""]}); renderAdminUI(); }
        function addWeaponEntry() { weapons.push({name: "New Arc", atkValue: "", subStat: "", desc: "", img: ""}); renderAdminUI(); }
        function deleteItem(type, i) { if(confirm("Delete?")) { if(type==='char') characters.splice(i,1); else if(type==='weapon') weapons.splice(i,1); else updates.splice(i,1); renderAdminUI(); } }

        function commitAllChanges() {
            updates = Array.from(document.querySelectorAll('#admin-update-list > div')).map(div => ({
                date: div.querySelector('.edit-upd-date').value,
                text: div.querySelector('.edit-upd-text').value
            }));

            // Сохраняем навыки персонажа обратно
            characters = Array.from(document.querySelectorAll('#admin-char-list > div')).map(div => {
                const awk = [];
                for(let i=0; i<6; i++) awk.push(div.querySelector(`.edit-char-awk-${i}`).value);
                return {
                    name: div.querySelector('.edit-char-name').value,
                    element: div.querySelector('.edit-char-element').value,
                    tier: div.querySelector('.edit-char-tier').value,
                    img: div.querySelector('.edit-char-img').value,
                    basic: div.querySelector('.edit-char-basic').value,
                    skill: div.querySelector('.edit-char-skill').value,
                    ult: div.querySelector('.edit-char-ult').value,
                    r1: div.querySelector('.edit-char-r1').value,
                    r2: div.querySelector('.edit-char-r2').value,
                    awakening: awk
                };
            });

            weapons = Array.from(document.querySelectorAll('#admin-weapon-list > div')).map(div => ({
                name: div.querySelector('.edit-w-name').value,
                atkValue: div.querySelector('.edit-w-atk').value,
                subStat: div.querySelector('.edit-w-sub').value,
                img: div.querySelector('.edit-w-img').value,
                desc: div.querySelector('.edit-w-desc').value
            }));

            updateSiteContent();
            document.getElementById('output-area').classList.remove('hidden');
            document.getElementById('final-code').value = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        }

        function updateSiteContent() {
            // Home News
            document.getElementById('home-updates').innerHTML = updates.map(upd => `
                <div class="bg-[#16181b] border-l-2 border-red-600 p-5 rounded-r-xl">
                    <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1 block">${upd.date}</span>
                    <p class="text-sm text-gray-300">${upd.text}</p>
                </div>`).join('') || '<p class="text-gray-700 text-center text-xs font-bold uppercase">No data</p>';

            // Characters Grid
            document.getElementById('char-grid').innerHTML = characters.map((char, index) => `
                <div onclick="viewChar(${index})" class="bg-[#16181b] border border-white/5 rounded-lg overflow-hidden cursor-pointer hover:border-red-600 transition">
                    <img src="${char.img}" class="aspect-[3/4] object-cover w-full">
                    <div class="p-3 text-center text-[10px] font-bold text-white uppercase">${char.name}</div>
                </div>`).join('');

            // Arcs (Weapons) Grid
            document.getElementById('weapon-grid').innerHTML = weapons.map((w, i) => `
                <div class="bg-[#16181b] p-6 rounded-xl border border-white/5 flex flex-col h-full shadow-lg">
                    <img src="${w.img}" class="h-40 w-full object-contain mb-4">
                    <h4 class="text-white font-bold uppercase text-base mb-3">${w.name}</h4>
                    
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <div class="bg-black/40 p-2 rounded">
                            <span class="text-[8px] text-gray-500 block uppercase font-bold">ATK</span>
                            <span class="text-xs text-white font-bold">${w.atkValue || '0'}</span>
                        </div>
                        <div class="bg-black/40 p-2 rounded">
                            <span class="text-[8px] text-red-500 block uppercase font-bold">Substat</span>
                            <span class="text-xs text-white font-bold">${w.subStat || '---'}</span>
                        </div>
                    </div>

                    <button onclick="toggleAccordion('w-desc-${i}')" class="text-[9px] font-bold text-red-500 uppercase tracking-widest text-left mb-2 flex items-center justify-between group">
                        Effect Details <span class="group-hover:rotate-90 transition-transform">+</span>
                    </button>
                    
                    <div id="w-desc-${i}" class="collapsible-content">
                        <p class="text-xs text-gray-400 leading-relaxed border-t border-white/5 pt-3">${w.desc || 'Passive effect not defined.'}</p>
                    </div>
                </div>`).join('');

            // Tier List
            const tiers = ['T0','T0.5','T1','T2','T3'];
            document.getElementById('tier-list-container').innerHTML = tiers.map(t => {
                const members = characters.filter(c => c.tier === t);
                return `
                <div class="tier-row">
                    <div class="tier-label ${t.replace('.','')}">${t}</div>
                    <div class="flex flex-wrap gap-3 p-4">
                        ${members.map(c => `<img src="${c.img}" class="w-14 h-14 rounded-lg object-cover border border-white/10 hover:border-red-600 cursor-pointer">`).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function viewChar(index) {
            const char = characters[index];
            const detail = document.getElementById('detail-view');
            detail.innerHTML = `
                <div class="bg-[#1a1c1e] rounded-2xl overflow-hidden border border-white/5 flex flex-row shadow-2xl mb-6">
                    <div class="w-1/2 bg-[#090a0c] h-[450px]"><img src="${char.img}" class="w-full h-full object-cover"></div>
                    <div class="p-10 w-1/2 flex flex-col justify-center">
                        <span class="bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded w-max mb-4 uppercase">${char.tier}</span>
                        <h3 class="nte-title text-5xl text-white mb-2 uppercase">${char.name}</h3>
                        <p class="text-red-500 text-sm font-bold uppercase tracking-widest">${char.element}</p>
                    </div>
                </div>
                <!-- Ability Tabs Rendered Here -->
                <div class="space-y-4">
                    <div class="bg-[#1a1c1e] border border-white/5 rounded-xl p-6">
                        <h4 class="nte-title text-white uppercase border-l-4 border-red-600 pl-4 mb-4">Abilities</h4>
                        <div class="grid grid-cols-1 gap-4">
                            <div class="bg-white/5 p-4 rounded"><span class="text-red-500 text-[10px] font-bold block uppercase mb-1">Basic</span><p class="text-sm">${char.basic || '---'}</p></div>
                            <div class="bg-white/5 p-4 rounded"><span class="text-red-500 text-[10px] font-bold block uppercase mb-1">Skill</span><p class="text-sm">${char.skill || '---'}</p></div>
                            <div class="bg-white/5 p-4 rounded"><span class="text-red-500 text-[10px] font-bold block uppercase mb-1">Ultimate</span><p class="text-sm">${char.ult || '---'}</p></div>
                            <div class="bg-white/5 p-4 rounded"><span class="text-red-500 text-[10px] font-bold block uppercase mb-1">R1</span><p class="text-sm">${char.r1 || '---'}</p></div>
                            <div class="bg-white/5 p-4 rounded"><span class="text-red-500 text-[10px] font-bold block uppercase mb-1">R2</span><p class="text-sm">${char.r2 || '---'}</p></div>
                        </div>
                    </div>
                </div>`;
            showSection('char-detail');
        }

        window.onload = updateSiteContent;
    </script>
</body>
</html>
