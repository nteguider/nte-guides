<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>NTE Guide Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Темная тема -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    :root {
      --theme-color: #ff3e3e;
      --sidebar-background: #121212;
      --content-background: #1a1a1a;
    }
    body { background-color: var(--content-background); }
    .sidebar { background-color: var(--sidebar-background); border-right: 1px solid #333; }

    /* Кнопки на главной */
    .btn-container { display: flex; gap: 15px; margin: 25px 0; flex-wrap: wrap; }
    .nav-btn {
      padding: 14px 28px;
      border-radius: 4px;
      font-weight: 800;
      text-transform: uppercase;
      text-decoration: none !important;
      transition: all 0.2s ease-in-out;
      display: inline-block;
      text-align: center;
      color: white !important;
    }
    .btn-red { background: #ff3e3e; }
    .btn-gold { background: #d4af37; color: black !important; }
    .btn-outline { border: 2px solid #ff3e3e; color: #ff3e3e !important; }
    .nav-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
  </style>
</head>
<body>
  <div id="app">Загрузка базы данных...</div>
  <script>
    window.$docsify = {
      name: 'NTE Guide',
      loadSidebar: true,
      auto2top: true,
      homepage: 'README.md', // Устраняет 404
      search: 'auto'
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
