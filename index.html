<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NTE Guide Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <style>
    :root { --theme-color: #ff3e3e; }
    .sidebar-nav ul li a { font-size: 15px; padding: 10px 15px; }
  </style>
</head>
<body>
  <div id="app">Accessing Hesperia Archives...</div>
  <script>
    window.$docsify = {
      name: 'NTE Guide',
      loadSidebar: true,
      subMaxLevel: 2,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      auto2top: true
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
