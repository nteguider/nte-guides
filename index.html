<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTE Master Database</title>
    <style>
        :root {
            --bg-body: #121214;
            --bg-panel: #1a1a1e;
            --bg-card: #232328;
            --text-main: #e0e0e0;
            --accent-teal: #42b983; 
            --accent-blue: #00a8ff;
            --accent-red: #ff4d4d;
            --border: #2f2f35;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 240px; background: #000; border-right: 1px solid var(--border); position: fixed; height: 100%; z-index: 100; }
        .sidebar-logo { padding: 20px; font-weight: bold; color: var(--accent-teal); text-align: center; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 12px 20px; cursor: pointer; color: #aaa; transition: 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { background: #1a1a1e; color: var(--accent-teal); border-left-color: var(--accent-teal); }
        .admin-link { color: var(--accent-red) !important; border-top: 1px solid var(--border); margin-top: 50px; }

        /* MAIN CONTENT */
        .main-content { margin-left: 240px; flex-grow: 1; padding: 30px; width: calc(100% - 240px); }
        .page { display: none; }
        .page.active { display: block; }
        .section-header { background: var(--bg-card); padding: 10px 15px; border-left: 4px solid var(--accent-teal); margin-bottom: 20px; font-size: 0.9rem; text-transform: uppercase; font-weight: bold; }

        /* GRID SYSTEM */
        .grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .card { width: 110px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; position: relative; cursor: pointer; }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card .name { font-size: 0.75rem; text-align: center; padding: 8px; background: rgba(0,0,0,0.8); }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: var(--accent-red); border: none; color: white; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; display: none; z-index: 10; font-weight: bold; }
        .admin-mode .delete-btn { display: block; }

        /* DETAIL MODAL (Matching image_fd5481.png & image_fd5462.png) */
        #detail-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-body); z-index: 200; overflow-y: auto; display: none; }
        .detail-container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .detail-close { position: fixed; top: 20px; right: 40px; font-size: 2.5rem; cursor: pointer; color: var(--accent-teal); }

        .skill-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .skill-header { background: var(--accent-teal); color: #000; padding: 12px; font-weight: bold; text-align: center; border-radius: 4px 4px 0 0; text-transform: uppercase; }
        .skill-box { background: var(--bg-card); padding: 20px; border-radius: 0 0 4px 4px; border: 1px solid var(--border); border-top: none; }
        .skill-title { color: #f1c40f; font-weight: bold; margin-bottom: 10px; display: block; font-size: 1.1rem; }
        .skill-desc { white-space: pre-wrap; line-height: 1.6; font-size: 0.9rem; color: #ddd; }

        .awakening-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .awk-item { background: var(--bg-card); border: 1px solid var(--border); padding: 15px; display: flex; gap: 15px; border-radius: 4px; }
        .awk-label { background: var(--accent-teal); color: #000; padding: 5px 10px; font-weight: bold; border-radius: 3px; height: fit-content; min-width: 35px; text-align: center; }
        .awk-content h4 { margin: 0 0 5px 0; color: var(--accent-teal); }
        .awk-content p { margin: 0; font-size: 0.85rem; color: #ccc; }

        /* TIER LIST STYLES */
        .tier-row { display: flex; background: var(--bg-card); margin-bottom: 12px; min-height: 120px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .tier-label { width: 70px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; color: #111; flex-shrink: 0; }
        .tier-items { display: flex; padding: 10px; gap: 10px; flex-wrap: wrap; }

        /* ADMIN EDITOR */
        .admin-flex { display: flex; gap: 20px; flex-wrap: wrap; }
        .editor-box { background: var(--bg-card); padding: 20px; border-radius: 8px; flex: 1; min-width: 400px; border: 1px solid var(--border); }
        input, textarea, select { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button.action-btn { background: var(--accent-teal); color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">NTE DATABASE</div>
        <div class="nav-item active" onclick="showPage('chars', this)">👥 Characters</div>
        <div class="nav-item" onclick="showPage('arcs', this)">🔫 Arcs</div>
        <div class="nav-item" onclick="showPage('tierlist', this)">📊 Character Tier List</div>
        <div class="nav-item admin-link" onclick="checkAdmin()">🔐 Admin Mode</div>
    </aside>

    <main class="main-content">
        <div id="chars" class="page active">
            <div class="section-header">Character Roster</div>
            <div id="grid-chars" class="grid"></div>
        </div>

        <div id="arcs" class="page">
            <div class="section-header">Weapon Arcs</div>
            <div id="grid-arcs" class="grid"></div>
        </div>

        <div id="tierlist" class="page">
            <div class="section-header">Character Tier List</div>
            <div id="char-tiers"></div>
        </div>

        <div id="admin" class="page">
            <div class="section-header">Admin Control</div>
            <div class="admin-flex">
                <div class="editor-box">
                    <h3>Basic Item Add</h3>
                    <select id="f-type">
                        <option value="chars">Character</option>
                        <option value="arcs">Weapon Arc</option>
                    </select>
                    <input type="text" id="f-name" placeholder="Name">
                    <input type="text" id="f-img" placeholder="Image URL">
                    <select id="f-tier-select">
                        <option value="">No Tier</option>
                        <option value="t0">T0</option>
                        <option value="t1">T1</option>
                        <option value="t2">T2</option>
                    </select>
                    <button class="action-btn" onclick="addItem()">Add to List</button>
                </div>

                <div class="editor-box">
                    <h3>Detail Editor</h3>
                    <div id="manage-char-list"></div>
                </div>
            </div>

            <div id="editor-details" class="editor-box" style="margin-top:20px; display:none;">
                <h3 id="editing-name">Editing Character Details</h3>
                <div class="admin-flex">
                    <div style="flex:1">
                        <h4>Skills (image_fd5481.png Reference)</h4>
                        <textarea id="ed-basic" placeholder="Basic Attack Text" rows="4"></textarea>
                        <textarea id="ed-secret" placeholder="Secret Skill Text" rows="4"></textarea>
                        <textarea id="ed-support" placeholder="Support Skill Text" rows="4"></textarea>
                        <textarea id="ed-ult" placeholder="Ultimate Text" rows="4"></textarea>
                    </div>
                    <div style="flex:1">
                        <h4>Awakenings (image_fd5462.png Reference)</h4>
                        <div id="awk-inputs">
                            <!-- JS will generate A1-A6 inputs -->
                        </div>
                        <h4>Resonance</h4>
                        <input type="text" id="ed-r1-t" placeholder="R1 Title"> <textarea id="ed-r1-d" placeholder="R1 Description"></textarea>
                        <input type="text" id="ed-r2-t" placeholder="R2 Title"> <textarea id="ed-r2-d" placeholder="R2 Description"></textarea>
                    </div>
                </div>
                <button class="action-btn" onclick="saveDetails()">Save Character Profile</button>
            </div>
        </div>
    </main>

    <div id="detail-view">
        <span class="detail-close" onclick="closeDetails()">×</span>
        <div class="detail-container" id="detail-content"></div>
    </div>

    <script>
        const DB_KEY = 'nte_master_v7';
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || { chars: [], arcs: [] };
        let currentId = null;

        const tiers = [
            { id: 't0', label: 'T0', color: '#ff4d4d' },
            { id: 't1', label: 'T1', color: '#ffb347' },
            { id: 't2', label: 'T2', color: '#ffea70' }
        ];

        // Init Awakening inputs in editor
        let awkInp = '';
        for(let i=1; i<=6; i++) {
            awkInp += `<input type="text" id="ed-a${i}-t" placeholder="A${i} Title">
                       <textarea id="ed-a${i}-d" placeholder="A${i} Description"></textarea>`;
        }
        document.getElementById('awk-inputs').innerHTML = awkInp;

        function save() { localStorage.setItem(DB_KEY, JSON.stringify(db)); render(); }

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            if(el) el.classList.add('active');
            document.body.classList.toggle('admin-mode', p === 'admin');
            render();
        }

        function checkAdmin() { if(prompt("Password:") === "1234") showPage('admin', document.querySelector('.admin-link')); }

        function addItem() {
            const type = document.getElementById('f-type').value;
            db[type].push({
                id: Date.now(),
                name: document.getElementById('f-name').value || "New",
                img: document.getElementById('f-img').value || "https://via.placeholder.com/150",
                tierId: document.getElementById('f-tier-select').value,
                details: {}
            });
            save();
        }

        function deleteItem(type, id) { if(confirm("Delete?")) { db[type] = db[type].filter(x => x.id !== id); save(); } }

        function openEditor(id) {
            currentId = id;
            const char = db.chars.find(x => x.id === id);
            document.getElementById('editor-details').style.display = 'block';
            document.getElementById('editing-name').textContent = "Editing: " + char.name;
            const d = char.details || {};
            document.getElementById('ed-basic').value = d.basic || '';
            document.getElementById('ed-secret').value = d.secret || '';
            document.getElementById('ed-support').value = d.support || '';
            document.getElementById('ed-ult').value = d.ult || '';
            for(let i=1; i<=6; i++) {
                document.getElementById(`ed-a${i}-t`).value = d[`a${i}t`] || '';
                document.getElementById(`ed-a${i}-d`).value = d[`a${i}d`] || '';
            }
            document.getElementById('ed-r1-t').value = d.r1t || '';
            document.getElementById('ed-r1-d').value = d.r1d || '';
            document.getElementById('ed-r2-t').value = d.r2t || '';
            document.getElementById('ed-r2-d').value = d.r2d || '';
        }

        function saveDetails() {
            const char = db.chars.find(x => x.id === currentId);
            char.details = {
                basic: document.getElementById('ed-basic').value,
                secret: document.getElementById('ed-secret').value,
                support: document.getElementById('ed-support').value,
                ult: document.getElementById('ed-ult').value,
                r1t: document.getElementById('ed-r1-t').value, r1d: document.getElementById('ed-r1-d').value,
                r2t: document.getElementById('ed-r2-t').value, r2d: document.getElementById('ed-r2-d').value
            };
            for(let i=1; i<=6; i++) {
                char.details[`a${i}t`] = document.getElementById(`ed-a${i}-t`).value;
                char.details[`a${i}d`] = document.getElementById(`ed-a${i}-d`).value;
            }
            save();
        }

        function openDetails(id) {
            const char = db.chars.find(x => x.id === id);
            const d = char.details || {};
            let awkHtml = '';
            for(let i=1; i<=6; i++) {
                awkHtml += `<div class="awk-item"><div class="awk-label">A${i}</div><div class="awk-content"><h4>${d[`a${i}t`] || '---'}</h4><p>${d[`a${i}d`] || '---'}</p></div></div>`;
            }
            document.getElementById('detail-content').innerHTML = `
                <h1 style="color:var(--accent-teal)">${char.name}</h1>
                <div class="skill-section">
                    <div>
                        <div class="skill-header">📦 Active Skills</div>
                        <div class="skill-box">
                            <span class="skill-title">Basic Attack</span><div class="skill-desc">${d.basic || '---'}</div>
                            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                            <span class="skill-title">Secret Skill</span><div class="skill-desc">${d.secret || '---'}</div>
                        </div>
                    </div>
                    <div>
                        <div class="skill-header">⭐ Support & Passives</div>
                        <div class="skill-box">
                            <span class="skill-title">Skill</span><div class="skill-desc">${d.support || '---'}</div>
                            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                            <span class="skill-title">Ultimate Technique</span><div class="skill-desc">${d.ult || '---'}</div>
                        </div>
                    </div>
                </div>
                <div class="section-header">Awakenings</div><div class="awakening-grid">${awkHtml}</div>
                <div class="section-header" style="margin-top:20px">Resonance</div>
                <div class="awakening-grid">
                    <div class="awk-item"><div class="awk-label">R1</div><div class="awk-content"><h4>${d.r1t || '---'}</h4><p>${d.r1d || '---'}</p></div></div>
                    <div class="awk-item"><div class="awk-label">R2</div><div class="awk-content"><h4>${d.r2t || '---'}</h4><p>${d.r2d || '---'}</p></div></div>
                </div>
            `;
            document.getElementById('detail-view').style.display = 'block';
        }

        function closeDetails() { document.getElementById('detail-view').style.display = 'none'; }

        function render() {
            const drawGrid = (el, data, type) => {
                document.getElementById(el).innerHTML = data.map(i => `
                    <div class="card" onclick="${type === 'chars' ? `openDetails(${i.id})` : ''}">
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteItem('${type}', ${i.id})">✕</button>
                        <img src="${i.img}"><div class="name">${i.name}</div>
                    </div>`).join('');
            };
            drawGrid('grid-chars', db.chars, 'chars');
            drawGrid('grid-arcs', db.arcs, 'arcs');

            document.getElementById('char-tiers').innerHTML = tiers.map(t => {
                const items = db.chars.filter(c => c.tierId === t.id);
                if(!items.length) return '';
                return `<div class="tier-row">
                            <div class="tier-label" style="background:${t.color}">${t.label}</div>
                            <div class="tier-items">${items.map(i => `<div class="card"><img src="${i.img}"><div class="name">${i.name}</div></div>`).join('')}</div>
                        </div>`;
            }).join('');

            document.getElementById('manage-char-list').innerHTML = db.chars.map(c => `
                <div style="display:flex; justify-content:space-between; padding:8px; background:#000; margin-bottom:4px;">
                    <span>${c.name}</span>
                    <button onclick="openEditor(${c.id})" style="background:var(--accent-blue); border:none; color:#fff; cursor:pointer; padding:2px 8px;">Edit</button>
                </div>`).join('');
        }
        render();
    </script>
</body>
</html>
