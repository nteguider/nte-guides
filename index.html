<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTE Database & Tier List Pro</title>
    <style>
        :root {
            --bg-body: #212126;
            --bg-sidebar: #1b1b1e;
            --bg-panel: #2a2a32;
            --text-main: #e0e0e0;
            --accent-blue: #00a8ff;
            --accent-red: #ff4d4d;
            --border-color: #383842;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 230px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            position: fixed;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-menu { list-style: none; padding: 0; margin: 0; }

        .nav-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            color: var(--text-main);
            text-decoration: none;
            transition: 0.2s;
            border-left: 3px solid transparent;
            font-size: 0.95rem;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.05);
            color: var(--accent-blue);
            border-left-color: var(--accent-blue);
        }

        .admin-link {
            margin-top: auto;
            color: var(--accent-red);
            border-top: 1px solid var(--border-color);
        }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: 230px; flex-grow: 1; padding: 30px; }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .section-header {
            background-color: var(--bg-panel);
            padding: 12px 15px;
            border-top: 2px solid var(--accent-blue);
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        /* --- CARDS & GRID --- */
        .grid-container { display: flex; flex-wrap: wrap; gap: 12px; }

        .item-card {
            width: 80px;
            background-color: var(--bg-panel);
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--border-color);
        }

        .item-card img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            background-color: #444;
        }

        .item-card .name {
            font-size: 0.7rem;
            text-align: center;
            padding: 4px 2px;
            background: rgba(0, 0, 0, 0.8);
            position: absolute;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
        }

        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            cursor: pointer;
            z-index: 10;
            display: none;
        }

        .admin-mode .delete-btn { display: block; }

        /* --- TIER LIST --- */
        .tier-row { display: flex; background-color: var(--bg-panel); margin-bottom: 8px; min-height: 110px; border: 1px solid var(--border-color); }
        .tier-label { 
            width: 80px; display: flex; align-items: center; justify-content: center; 
            font-size: 1.3rem; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000;
        }
        /* Цвета рангов */
        .t0   { background-color: #ff4d4d; } /* Красный */
        .t0-5 { background-color: #ff7f50; } /* Коралловый */
        .t1   { background-color: #ffb347; } /* Оранжевый */
        .t2   { background-color: #ffea70; color: #333; text-shadow: none; } /* Желтый */
        .t3   { background-color: #98ff98; color: #333; text-shadow: none; } /* Салатовый */

        .tier-content { display: flex; padding: 10px; gap: 10px; flex-wrap: wrap; flex-grow: 1; }

        /* --- ADMIN FORM --- */
        .admin-form {
            background: var(--bg-panel);
            padding: 25px;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .admin-form input, .admin-form select, .admin-form textarea {
            background: #1b1b1e;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 4px;
        }

        .admin-form button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        #home-news-content { white-space: pre-wrap; line-height: 1.6; color: #ccc; }
    </style>
</head>
<body class="user-view">

    <aside class="sidebar">
        <div class="sidebar-logo">NTE GUIDE</div>
        <nav class="nav-menu">
            <a onclick="showPage('home', this)" class="nav-item active">🏠 Home</a>
            <a onclick="showPage('chars', this)" class="nav-item">👥 Characters</a>
            <a onclick="showPage('weapons', this)" class="nav-item">🔫 Weapons</a>
            <a onclick="showPage('tierlist', this)" class="nav-item">📊 Tier List</a>
            <a onclick="checkAdmin()" class="nav-item admin-link">🔐 Admin Panel</a>
        </nav>
    </aside>

    <main class="main-content">
        <!-- HOME -->
        <div id="home" class="page active">
            <div class="section-header">Latest Updates</div>
            <div id="home-news-content">Загрузка...</div>
        </div>

        <!-- CHARACTERS -->
        <div id="chars" class="page">
            <div class="section-header">Characters List</div>
            <div id="chars-grid" class="grid-container"></div>
        </div>

        <!-- WEAPONS -->
        <div id="weapons" class="page">
            <div class="section-header">Weapons Database</div>
            <div id="weapons-grid" class="grid-container"></div>
        </div>

        <!-- TIER LIST (Обновленный список уровней) -->
        <div id="tierlist" class="page">
            <div class="section-header">Character Tier List</div>
            <div class="tier-row"><div class="tier-label t0">T0</div><div id="tier-t0" class="tier-content"></div></div>
            <div class="tier-row"><div class="tier-label t0-5">T0.5</div><div id="tier-t0-5" class="tier-content"></div></div>
            <div class="tier-row"><div class="tier-label t1">T1</div><div id="tier-t1" class="tier-content"></div></div>
            <div class="tier-row"><div class="tier-label t2">T2</div><div id="tier-t2" class="tier-content"></div></div>
            <div class="tier-row"><div class="tier-label t3">T3</div><div id="tier-t3" class="tier-content"></div></div>
        </div>

        <!-- ADMIN PANEL -->
        <div id="admin" class="page">
            <div class="section-header">Admin Control Panel</div>
            
            <div class="admin-form">
                <h3>Edit Home Text</h3>
                <textarea id="f-home-text" rows="4"></textarea>
                <button onclick="saveHomeText()">Update Home</button>
            </div>

            <div class="admin-form">
                <h3>Add New Entry</h3>
                <select id="f-type">
                    <option value="char">Character</option>
                    <option value="weapon">Weapon</option>
                </select>
                <input type="text" id="f-name" placeholder="Name">
                <input type="text" id="f-img" placeholder="Image URL">
                <textarea id="f-desc" rows="2" placeholder="Description"></textarea>
                <select id="f-tier">
                    <option value="">No Tier</option>
                    <option value="t0">Tier 0</option>
                    <option value="t0-5">Tier 0.5</option>
                    <option value="t1">Tier 1</option>
                    <option value="t2">Tier 2</option>
                    <option value="t3">Tier 3</option>
                </select>
                <button onclick="saveToDB()">Save Entry</button>
            </div>
        </div>
    </main>

    <script>
        let database = JSON.parse(localStorage.getItem('nte_final_db')) || { 
            chars: [], 
            weapons: [], 
            homeText: "Добро пожаловать в архив!" 
        };

        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(el) el.classList.add('active');
            
            if(pageId === 'admin') {
                document.body.classList.add('admin-mode');
                document.getElementById('f-home-text').value = database.homeText;
            } else {
                document.body.classList.remove('admin-mode');
            }
            render();
        }

        function checkAdmin() {
            if(prompt("Пароль:") === "1234") showPage('admin', document.querySelector('.admin-link'));
        }

        function saveHomeText() {
            database.homeText = document.getElementById('f-home-text').value;
            localStorage.setItem('nte_final_db', JSON.stringify(database));
            render();
        }

        function saveToDB() {
            const type = document.getElementById('f-type').value;
            const newItem = {
                id: Date.now(),
                name: document.getElementById('f-name').value || "Unnamed",
                img: document.getElementById('f-img').value || "https://via.placeholder.com/80x100",
                desc: document.getElementById('f-desc').value,
                tier: document.getElementById('f-tier').value
            };
            if(type === 'char') database.chars.push(newItem);
            else database.weapons.push(newItem);
            localStorage.setItem('nte_final_db', JSON.stringify(database));
            render();
        }

        function deleteItem(type, id) {
            if(type === 'char') database.chars = database.chars.filter(i => i.id !== id);
            else database.weapons = database.weapons.filter(i => i.id !== id);
            localStorage.setItem('nte_final_db', JSON.stringify(database));
            render();
        }

        function render() {
            document.getElementById('home-news-content').textContent = database.homeText;

            const charGrid = document.getElementById('chars-grid');
            charGrid.innerHTML = database.chars.map(c => `
                <div class="item-card">
                    <button class="delete-btn" onclick="deleteItem('char', ${c.id})">✕</button>
                    <img src="${c.img}">
                    <div class="name">${c.name}</div>
                </div>
            `).join('');

            const weapGrid = document.getElementById('weapons-grid');
            weapGrid.innerHTML = database.weapons.map(w => `
                <div class="item-card">
                    <button class="delete-btn" onclick="deleteItem('weapon', ${w.id})">✕</button>
                    <img src="${w.img}">
                    <div class="name">${w.name}</div>
                </div>
            `).join('');

            // Рендер всех 5 уровней тир-листа
            ['t0', 't0-5', 't1', 't2', 't3'].forEach(tRank => {
                const row = document.getElementById('tier-' + tRank);
                if(row) {
                    row.innerHTML = database.chars.filter(c => c.tier === tRank).map(c => `
                        <div class="item-card" style="width: 70px;">
                            <img src="${c.img}" style="height: 85px;">
                            <div class="name">${c.name}</div>
                        </div>
                    `).join('');
                }
            });
        }

        render();
    </script>
</body>
</html>
